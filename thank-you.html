<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Thank You | TaxTallyPro</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="style.css?v=1.6">
    <link rel="icon" type="image/png" href="TAX_TALLY_LOGO_TRANSPARENT.png">
    
    <style>
        .thank-you-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 3rem;
            position: relative;
        }
        
        .thank-you-card {
            max-width: 650px;
            padding: 4rem 3rem;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(var(--accent-blue-rgb), 0.15);
            border: 1px solid rgba(var(--accent-blue-rgb), 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.5rem;
            box-shadow: 0 0 30px rgba(var(--accent-blue-rgb), 0.2);
        }

        .icon-circle svg {
            color: #34D399; /* Success Green */
            width: 36px;
            height: 36px;
        }

        .thank-you-title {
            font-size: clamp(2.5rem, 4vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .thank-you-desc {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.7;
        }
    </style>

    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('track', 'Lead');

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=2429026794253906&ev=PageView&noscript=1"
    /></noscript>

</head>
<body>

    <!-- Floating Background Lights -->
    <div class="glow-orb orb-blue"></div>
    <div class="glow-orb orb-red"></div>

    <!-- Floating Glassmorphism Navbar -->
    <header class="navbar-wrapper">
        <nav class="navbar" id="navbar" style="justify-content: center;">
            <a href="index.html" class="nav-logo" id="nav-logo" style="margin: 0;">
                <img src="TAX_TALLY_LOGO_TRANSPARENT.png" alt="TaxTallyPro Logo" class="logo-img" />
            </a>
        </nav>
    </header>

    <!-- Thank You Section -->
    <section class="thank-you-section">
        <div class="container">
            <div class="thank-you-card glass glow-border-blue-red mx-auto">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h1 class="thank-you-title">
                    Thank <span class="text-gradient-red-blue">You!</span>
                </h1>
                <p class="thank-you-desc">
                    Your request has been successfully received. Our team is currently reviewing your details and will be in touch shortly to schedule your financial translation audit.
                </p>
                <div class="hero-actions" style="margin-bottom: 0; justify-content: center; width: 100%;">
                    <a href="index.html" class="btn btn-primary btn-large">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                        Back to Homepage
                    </a>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
